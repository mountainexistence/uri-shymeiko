<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 104" width="500" height="104" role="img" aria-label="URI SHYMEIKO">
  <!-- rounded border frame -->
  <rect x="5" y="5" width="490" height="94" rx="10" ry="10"
        fill="none" stroke="#000" stroke-width="6"/>

  <!-- camera icon -->
  <g fill="#000">
    <!-- viewfinder bump -->
    <path d="M55 33 h22 l5 8 h-32 z"/>
    <!-- camera body -->
    <rect x="32" y="38" width="74" height="44" rx="7" ry="7"/>
    <!-- lens (cut out) -->
    <circle cx="69" cy="60" r="15" fill="#fff"/>
    <circle cx="69" cy="60" r="8"  fill="#000"/>
  </g>

  <!-- wordmark -->
  <text x="128" y="71"
        font-family="Helvetica, Arial, 'Liberation Sans', sans-serif"
        font-size="43" font-weight="700" letter-spacing="1.5"
        fill="#000">URI SHYMEIKO</text>
</svg>
